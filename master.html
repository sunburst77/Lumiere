<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Banner Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Pretendard', 'system-ui', 'sans-serif'],
            doHyeon: ['"Do Hyeon"', 'Pretendard', 'sans-serif'],
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── 두 번째 배너 : 그레이톤 그라디언트 (페이지 배경과 구분되도록) ── */
    .card-pastel-bg {
      background: linear-gradient(135deg,
        #ececee 0%,
        #e2e2e6 45%,
        #d8d8de 100%);
    }

    .font-title {
      font-family: 'Do Hyeon', 'Pretendard', sans-serif;
    }

    /* 첫 배너 이미지: 좌측 투명 → 중간 이후 100% 불투명 */
    .banner-image-mask {
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        rgba(0, 0, 0, 0.35) 12%,
        #000 52%,
        #000 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0%,
        rgba(0, 0, 0, 0.35) 12%,
        #000 52%,
        #000 100%
      );
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 font-sans flex items-center justify-center p-8">

  <div class="w-full max-w-5xl space-y-8">

    <!-- ═══════════════════════════════════════════════
         카드 1 : 좌측 텍스트 + 우측 이미지 배너
    ═══════════════════════════════════════════════ -->
    <div class="relative rounded-5xl overflow-hidden min-h-[340px] flex flex-col md:flex-row md:items-stretch bg-gradient-to-br from-pink-200 via-violet-200 to-sky-300">

      <!-- 좌측: 텍스트 -->
      <div class="relative z-10 flex-1 p-10 md:p-14 flex flex-col justify-center min-w-0">

        <!-- 뱃지 -->
        <span class="inline-flex w-fit items-center gap-1.5 bg-transparent border border-gray-900 text-gray-900 text-xs font-bold tracking-widest uppercase px-4 py-1.5 rounded-full mb-5 shadow-sm">
          <span class="w-1.5 h-1.5 rounded-full bg-pink-500 animate-pulse"></span>
          지금 예약 가능
        </span>

        <!-- 타이틀 -->
        <h2 class="font-title text-gray-900 text-4xl md:text-5xl leading-tight mb-4">
          당신의 건강, 지금 바로<br/>전문의와 상담하세요
        </h2>

        <!-- 본문 텍스트 -->
        <p class="text-gray-700 text-base md:text-lg leading-relaxed font-semibold mb-8">
          내과·정형외과·피부과 등 15개 진료과 전문의가 상시 대기 중입니다.<br class="hidden md:block"/>
          온라인 예약으로 대기 없이 빠르게 진료받으세요.
        </p>

        <!-- 버튼 2개 -->
        <div class="flex flex-wrap gap-3">
          <!-- CTA 버튼 (블랙톤) -->
          <a href="#"
             class="inline-flex items-center justify-center bg-gray-900 text-white font-bold text-sm px-6 py-3 rounded-2xl shadow-lg hover:bg-gray-800 hover:shadow-xl transition-all duration-200 active:scale-95">
            진료 예약하기
          </a>
          <!-- Sub 버튼 -->
          <a href="#"
             class="inline-flex items-center gap-2 bg-white text-gray-900 font-bold text-sm px-6 py-3 rounded-2xl hover:bg-gray-50 transition-all duration-200 active:scale-95">
            진료 안내 보기
          </a>
        </div>

      </div>

      <!-- 우측: 이미지 (전체 높이 · 우측 정렬 · 보더 없음) -->
      <div class="relative z-10 w-full md:w-[42%] lg:w-[40%] shrink-0 h-52 sm:h-60 md:h-auto md:self-stretch md:min-h-0">
        <img
          src="model.png"
          alt="모델 이미지"
          class="banner-image-mask absolute inset-0 w-full h-full object-cover object-top rounded-b-5xl md:rounded-none md:rounded-tr-5xl md:rounded-br-5xl"
        />
      </div>

      <!-- 장식 블러 -->
      <div class="absolute -right-16 -bottom-16 w-72 h-72 rounded-full bg-pink-400/25 blur-2xl pointer-events-none"></div>
      <div class="absolute right-1/3 top-8 w-28 h-28 rounded-full bg-blue-300/20 blur-xl pointer-events-none"></div>
    </div>


    <!-- ═══════════════════════════════════════════════
         카드 2 : 그레이톤 배경 배너
    ═══════════════════════════════════════════════ -->
    <div class="relative card-pastel-bg rounded-5xl overflow-hidden min-h-[340px] flex items-center">

      <div class="relative z-10 w-full px-10 md:px-14 py-10 md:py-14 max-w-3xl">

        <!-- 뱃지 -->
        <span class="inline-flex w-fit items-center gap-1.5 bg-transparent border border-gray-900 text-gray-900 text-xs font-bold tracking-widest uppercase px-4 py-1.5 rounded-full mb-5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
          </svg>
          건강검진 패키지
        </span>

        <!-- 타이틀 -->
        <h2 class="font-title text-gray-800 text-4xl md:text-5xl leading-tight mb-4">
          정기 건강검진으로<br/>
          <span class="text-pink-500">조기 발견, 빠른 치료</span>
        </h2>

        <!-- 본문 텍스트 -->
        <p class="text-gray-500 text-base md:text-lg leading-relaxed font-semibold mb-8">
          맞춤형 건강검진 패키지로 숨어 있는 질환을 미리 발견하세요.<br class="hidden md:block"/>
          결과 상담부터 사후 관리까지 전담 코디네이터가 함께합니다.
        </p>

        <!-- 버튼 2개 -->
        <div class="flex flex-wrap gap-3">
          <!-- CTA 버튼 (블랙톤) -->
          <a href="#"
             class="inline-flex items-center justify-center bg-gray-900 text-white font-bold text-sm px-6 py-3 rounded-2xl shadow-md hover:bg-gray-800 hover:shadow-lg transition-all duration-200 active:scale-95">
            패키지 신청하기
          </a>
          <!-- Sub 버튼 -->
          <a href="#"
             class="inline-flex items-center gap-2 bg-white text-gray-900 font-bold text-sm px-6 py-3 rounded-2xl hover:bg-gray-50 transition-all duration-200 active:scale-95">
            검진 항목 확인
          </a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
